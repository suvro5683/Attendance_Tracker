[build]
  publish = "."
  functions = "netlify/functions"
  command = "echo 'No build step required — static site + serverless functions.'"

[functions]
  node_bundler = "esbuild"

# ---------------------------------------------------------------------------
# Security headers, applied to every response.
# ---------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"

# ---------------------------------------------------------------------------
# SPA-style fallback isn't needed (single page), but keep the app reachable
# at any path just in case of trailing slashes, etc.
# ---------------------------------------------------------------------------
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
